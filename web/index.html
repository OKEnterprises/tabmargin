<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabMargin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap">

  <!-- tokens + the editor and account component styles are copied from the
       extension at build time; web.css adds the gate + settings-panel shell. -->
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="web.css">
</head>
<body>
  <!-- ===== Auth gate (shown until signed in — the site requires login) ===== -->
  <div class="auth-gate" id="authGate" hidden>
    <div class="auth-card">
      <div class="brand">TabMargin</div>
      <p class="auth-tagline" id="authTagline">Your notes, on every device.</p>

      <div id="signedOutView">
        <form class="auth-form" id="authForm">
          <input type="email" id="emailInput" class="text-input" placeholder="email" autocomplete="email" required>
          <input type="password" id="passwordInput" class="text-input" placeholder="password" autocomplete="current-password" required>
          <div class="auth-actions">
            <button type="submit" class="btn-primary" id="signInBtn">Sign in</button>
            <button type="button" class="btn-text" id="signUpBtn">Create account</button>
          </div>
          <button type="button" class="btn-text btn-text-quiet" id="forgotBtn">Forgot password?</button>
        </form>
      </div>

      <div class="auth-message" id="authMessage" hidden></div>
    </div>
  </div>

  <!-- ===== App (shown when signed in) ===== -->
  <div class="app-shell" id="appShell" hidden>
    <button class="settings-toggle" id="settingsToggle" title="Settings" aria-label="Settings" aria-haspopup="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>

    <div class="container">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar" aria-label="Notes list">
        <div class="sidebar-header">
          <h2>Notes</h2>
          <button class="btn-icon" id="newNoteBtn" title="New note" aria-label="New note">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div class="notes-list" id="notesList"></div>
      </aside>

      <!-- Main editor area -->
      <main class="main">
        <button class="toggle-sidebar" id="toggleSidebar" title="Toggle notes list" aria-label="Toggle notes list" aria-controls="sidebar" aria-expanded="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="4" width="18" height="16" rx="2"/>
            <line x1="9" y1="4" x2="9" y2="20"/>
          </svg>
        </button>

        <div class="editor-container">
          <div class="note-title-wrap">
            <input
              type="text"
              class="note-title"
              id="noteTitle"
              placeholder="Untitled"
              spellcheck="false"
              aria-label="Note title"
            >
          </div>
          <textarea
            class="editor"
            id="editor"
            placeholder="Start writing&hellip;"
            spellcheck="true"
            aria-label="Note content"
          ></textarea>
        </div>

        <!-- Status bar -->
        <div class="status-bar">
          <div class="stats">
            <span id="wordCount">0 words</span>
            <span class="separator">·</span>
            <span id="charCount">0 characters</span>
          </div>
          <div class="actions">
            <span class="save-status saved" id="saveStatus" role="status" aria-live="polite">Saved</span>
            <button class="btn-icon-action" id="exportBtn" title="Export note (⌘E)" aria-label="Export note">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
            <button class="btn-icon-action" id="deleteBtn" title="Delete note" aria-label="Delete note">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 6h18"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
              <span class="confirm-label">really?</span>
            </button>
          </div>
        </div>
      </main>
    </div>

    <!-- Settings slide-over (account + theme; reuses the popup's markup).
         Visibility is driven by the .open class so it can slide both ways;
         the [hidden] attribute would force display:none and kill the transition. -->
    <div class="settings-scrim" id="settingsScrim"></div>
    <aside class="settings-panel" id="settingsPanel" aria-label="Settings">
      <div class="settings-panel-inner">
        <section class="section">
          <h2>Account</h2>

          <div id="signedInView" hidden>
            <div class="account-row">
              <span class="account-dot"></span>
              <span class="account-email" id="accountEmail"></span>
              <span class="plan-badge" id="planBadge">Free</span>
            </div>

            <div id="freeView" hidden>
              <p class="account-meta">Cloud sync requires Pro.</p>
              <button class="btn-primary btn-block" id="upgradeBtn">Upgrade — $3/mo</button>
            </div>

            <div id="proView" hidden>
              <p class="account-meta" id="proMeta">Cloud sync active</p>
              <button type="button" class="btn-text btn-text-quiet" id="manageBtn">Manage subscription</button>
            </div>

            <button type="button" class="btn-text btn-text-quiet" id="signOutBtn">Sign out</button>
          </div>
        </section>

        <div class="divider"></div>

        <section class="section">
          <h2>Theme</h2>
          <div class="theme-options" role="radiogroup" aria-label="Theme">
            <label class="theme-option">
              <input type="radio" name="theme" value="system" checked>
              <span class="dot"></span>
              <span class="label">System</span>
            </label>
            <label class="theme-option">
              <input type="radio" name="theme" value="light">
              <span class="dot"></span>
              <span class="label">Light</span>
            </label>
            <label class="theme-option">
              <input type="radio" name="theme" value="dark">
              <span class="dot"></span>
              <span class="label">Dark</span>
            </label>
          </div>
        </section>
      </div>
    </aside>
  </div>

  <!-- storage.js (web variant) MUST load first; the rest are copied verbatim from
       the extension. app.js is the web-only glue and loads last. -->
  <script src="storage.js"></script>
  <script src="sync.js"></script>
  <script src="api.js"></script>
  <script src="script.js"></script>
  <script src="popup.js"></script>
  <script src="app.js"></script>
</body>
</html>
